# ============================================================================
# RAE Attendance System - Complete Nginx Configuration
# Domain: raeservice.mju.ac.th
# ============================================================================
# 
# Backend API (Node.js): localhost:3000
# Canva Service: localhost:3005
# Frontend (Vue 3): /var/www/attendance-dashboard/dist (or custom path)
# 
# Installation:
#   1. Copy to: /etc/nginx/sites-available/raeservice.mju.ac.th.conf
#   2. Enable: ln -s /etc/nginx/sites-available/raeservice.mju.ac.th.conf /etc/nginx/sites-enabled/
#   3. Test: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx
# ============================================================================

# CORS Origin Map - Validate and set allowed origin
map $http_origin $cors_origin {
    default "";
    "~^https://raeservice\.mju\.ac\.th$" $http_origin;
}

# Upstream definitions for load balancing and health checks
upstream rae_backend_api {
    server 127.0.0.1:3000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

upstream orchestrator_backend {
    server 127.0.0.1:3007 fail_timeout=5s max_fails=3;
    keepalive 32;
}

upstream canva_service_backend {
    server 127.0.0.1:3005 fail_timeout=5s max_fails=3;
    keepalive 16;
}

# ============================================================================
# HTTP Server Block - Redirect to HTTPS
# ============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name raeservice.mju.ac.th;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$server_name$request_uri;
}

# ============================================================================
# HTTPS Server Block
# ============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name raeservice.mju.ac.th;

    # ========================================================================
    # SSL Configuration
    # ========================================================================
    # Update these paths to match your actual certificate locations
    ssl_certificate /etc/ssl/mju/mju_ac_th.fullchain.crt;
    ssl_certificate_key /etc/ssl/mju/mju_ac_th.key;
    
    # Optional: If you have a certificate chain
    # ssl_trusted_certificate /etc/ssl/mju/ca_trust.pem;

    # SSL Protocols - Modern and secure
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # SSL Ciphers - Strong encryption
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    
    # SSL Session Cache - Improve performance
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP Stapling - Improve SSL handshake performance
    ssl_stapling on;
    ssl_stapling_verify on;
    # resolver 8.8.8.8 8.8.4.4 valid=300s;
    # resolver_timeout 5s;

    # ========================================================================
    # Security Headers
    # ========================================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # CORS Headers - Global (for non-API endpoints)
    # Note: Specific origin is set in location blocks below

    # ========================================================================
    # Logging
    # ========================================================================
    access_log /var/log/nginx/raeservice-access.log;
    error_log /var/log/nginx/raeservice-error.log warn;

    # ========================================================================
    # Client Settings
    # ========================================================================
    client_max_body_size 20M;
    client_body_buffer_size 128k;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # ========================================================================
    # Proxy Timeouts (Global defaults)
    # ========================================================================
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ========================================================================
    # Deterministic Routing Order (most specific first)
    # ========================================================================
    
    # ========================================================================
    # /api/admin/* -> Orchestrator (port 3007) - MUST come before /api/
    # ========================================================================
    location ^~ /api/admin/ {
        proxy_pass http://orchestrator_backend;
        
        # CRITICAL: Use HTTP/1.1 for proper proxy functionality
        proxy_http_version 1.1;
        
        # Essential proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        # CORS Headers
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;
        
        # Safety header for debugging
        add_header X-Routed-By "nginx:/api/admin->3007" always;
        
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Type 'text/plain; charset=utf-8' always;
            add_header Content-Length 0 always;
            return 204;
        }
        
        # Buffering - Disable for real-time API responses
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # ========================================================================
    # Joomla Update API (keep under /api/ without breaking backend)
    # ========================================================================
    location ^~ /api/index.php/v1/joomlaupdate/ {
        proxy_pass http://127.0.0.1:8081/api/index.php/v1/joomlaupdate/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    

    # ========================================================================
    # Joomla 6 Green Office – 301 redirect ไปยัง canonical domain
    # https://raeservice.mju.ac.th/greenoffice/* → https://goffice.mju.ac.th/*
    # ========================================================================
    location ~ ^/greenoffice(/.*)?$ {
        return 301 https://goffice.mju.ac.th$1;
    }

    # ========================================================================
    # Canva Service Proxy (MUST come before /api/ location)
    # ========================================================================
    location /canva_api/ {
        proxy_pass http://canva_service_backend/;
        
        # Proxy HTTP version
        proxy_http_version 1.1;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ========================================================================
    # API Reverse Proxy - Main Backend (Node.js on port 3000)
    # Keep current behavior for /api/ routes that are not /api/admin/
    # ========================================================================
    location ^~ /api/ {
        # Proxy to Node.js backend
        proxy_pass http://rae_backend_api/api/;
        
        # CRITICAL: Use HTTP/1.1 for proper proxy functionality
        proxy_http_version 1.1;
        
        # Essential proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (for real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        
        # CORS Headers - Required for browser-based API calls
        # Use validated origin from map (only allows https://raeservice.mju.ac.th)
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age 86400 always;
        
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Type 'text/plain; charset=utf-8' always;
            add_header Content-Length 0 always;
            return 204;
        }
        
        # Buffering - Disable for real-time API responses
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts - Adjust based on your API response times
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # ========================================================================
    # LiteLLM Gateway (Cursor) - /cursor -> port 4000
    # ========================================================================
    location /cursor/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # ========================================================================
    # Health Check Endpoint (Direct access without proxy)
    # ========================================================================
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ========================================================================
    # Frontend Static Files (Vue.js SPA)
    # ========================================================================
    # Update this path to match your actual frontend build directory

    # ========================================================================
    # Static Assets Directory
    # ========================================================================
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ========================================================================
    # Favicon and robots.txt
    # ========================================================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 30d;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # Security - Deny access to hidden files and sensitive paths
    # ========================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ========================================================================
    # Gzip Compression
    # ========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Research Portal - Data Files
    # ========================================================================
    location ^~ /research-portal/data/ {
        alias /var/www/raeservice/research-portal/data/;
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;
        expires 1h;
    }

    # ========================================================================
    # Research Portal (Information/Landing page for Research Management System)
    # ========================================================================
    location /research-portal/ {
        alias /var/www/raeservice/research-portal/;
        index index.html;
        try_files $uri $uri/ /research-portal/index.html;
    }

    # ========================================================================
    # WordPress (Legacy Install/Recovery)
    # ========================================================================
    location = /wp-admin {
        return 301 /wp-admin/;
    }

    location ^~ /wp-admin/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location = /wp-login.php {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location ^~ /wp-content/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location ^~ /wp-includes/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location ^~ /wp-json/ {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location = /xmlrpc.php {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # ========================================================================
    # Main Service Portal - Landing Page (moved from root)
    # ========================================================================
    location /main-service/ {
        alias /var/www/html/main-service/;
        index index.html index.htm;
        try_files $uri $uri/ /main-service/index.html =404;
    }
    
    location = /main-service {
        return 301 /main-service/;
    }

    # ========================================================================
    # Metabase - Business Intelligence (port 3100)
    # ========================================================================
    location /metabase/ {
        proxy_pass http://127.0.0.1:3100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }

    # ========================================================================
    # n8n Workflow (port 5679)
    # ========================================================================
    location /n8n/ {
        proxy_pass http://127.0.0.1:5679/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # ========================================================================
    # phpMyAdmin - Database Management
    # ========================================================================
    location /phpmyadmin/ {
        alias /usr/share/phpmyadmin/;
        index index.php;
        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    # ========================================================================
    # หน้าหลัก (/) = Dashboard รวมทุกระบบ — redirect ไป /dashboard/
    # ========================================================================
    location = / {
        return 302 /dashboard/;
    }
    location /dashboard/ {
        alias /var/www/html/dashboard/;
        index index.html;
        try_files $uri $uri/ /dashboard/index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    location = /dashboard {
        return 301 /dashboard/;
    }

    # ========================================================================
    # Vue.js Dashboard App (/attendance/)
    # ========================================================================
    location /attendance/ {
        alias /var/www/attendance-dashboard/dist/;
        index index.html;
        try_files $uri $uri/ /attendance/index.html;
    }

    # ========================================================================
    # สรุป: หน้าหลัก (/) = Dashboard | Joomla ที่ /greenoffice/ | WordPress ที่ /wp-admin ฯลฯ
    # ========================================================================

    # ========================================================================
    # /admin/* -> Frontend (Next.js static export)
    # ========================================================================
    location ^~ /admin/ {
        # Route to frontend static files
        alias /usr/share/nginx/html/research-portal/admin/;
        try_files $uri $uri/ /admin/dashboard/index.html =404;
        # Cache-busting for admin routes
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Handle /admin (without trailing slash) - redirect to dashboard
    location = /admin {
        return 301 /admin/dashboard/;
    }
    
    # Serve Next.js static assets for Admin Dashboard (MUST come before general /admin/dashboard/ location)
    location ^~ /admin/dashboard/_next/static/ {
        alias /usr/share/nginx/html/research-portal/_next/static/;
        try_files $uri =404;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Serve other Next.js assets
    location ^~ /admin/dashboard/_next/ {
        alias /usr/share/nginx/html/research-portal/_next/;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Research Portal Frontend (Admin Dashboard) - Next.js static export SPA routing
    location /admin/dashboard/ {
        alias /usr/share/nginx/html/research-portal/admin/dashboard/;
        try_files $uri $uri/ /admin/dashboard/index.html =404;
        # Cache-busting
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}

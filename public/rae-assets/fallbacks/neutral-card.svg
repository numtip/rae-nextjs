<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title>RAE neutral card fallback</title>
  <desc>Temporary institutional fallback for missing RAE card imagery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4a6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g opacity="0.14" stroke="#ffffff" stroke-width="1">
    <path d="M0 100H1200M0 220H1200M0 340H1200M0 460H1200M0 580H1200M0 700H1200"/>
    <path d="M120 0V800M300 0V800M480 0V800M660 0V800M840 0V800M1020 0V800"/>
  </g>
  <circle cx="940" cy="160" r="180" fill="#00b4a6" opacity="0.08"/>
  <circle cx="240" cy="620" r="220" fill="#38bdf8" opacity="0.08"/>
  <rect x="90" y="92" width="130" height="6" rx="3" fill="url(#accent)"/>
  <text x="90" y="190" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700">RAE</text>
  <text x="90" y="250" fill="#d7e3ef" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="600">Temporary institutional fallback</text>
  <text x="90" y="300" fill="#9fb3c8" font-family="Arial, Helvetica, sans-serif" font-size="24">Replace with approved photography before production release.</text>
  <text x="90" y="690" fill="#7e95ad" font-family="Arial, Helvetica, sans-serif" font-size="20">Neutral asset placeholder - no stock photography used</text>
</svg>
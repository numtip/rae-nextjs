<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title>RAE hero fallback</title>
  <desc>Temporary institutional fallback for missing RAE hero photography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="52%" stop-color="#102844"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4a6"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.12" stroke="#ffffff" stroke-width="1">
    <path d="M0 120H1600M0 240H1600M0 360H1600M0 480H1600M0 600H1600M0 720H1600M0 840H1600"/>
    <path d="M160 0V900M320 0V900M480 0V900M640 0V900M800 0V900M960 0V900M1120 0V900M1280 0V900M1440 0V900"/>
  </g>
  <circle cx="1230" cy="200" r="260" fill="#00b4a6" opacity="0.08"/>
  <circle cx="390" cy="650" r="320" fill="#38bdf8" opacity="0.07"/>
  <rect x="110" y="120" width="180" height="8" rx="4" fill="url(#bar)"/>
  <text x="110" y="240" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">RAE HERO PLACEHOLDER</text>
  <text x="110" y="315" fill="#d7e3ef" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="600">Temporary institutional fallback for hero imagery</text>
  <text x="110" y="365" fill="#9fb3c8" font-family="Arial, Helvetica, sans-serif" font-size="24">Use only until approved photography is acquired.</text>
  <text x="110" y="820" fill="#7e95ad" font-family="Arial, Helvetica, sans-serif" font-size="20">No stock photography. Neutral brand placeholder only.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title>RAE event placeholder</title>
  <desc>Temporary institutional fallback for event news imagery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081826"/>
      <stop offset="100%" stop-color="#173d66"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g fill="#00b4a6" opacity="0.92">
    <rect x="260" y="250" width="680" height="220" rx="24"/>
    <rect x="290" y="290" width="180" height="26" rx="13" fill="#ffffff" opacity="0.9"/>
    <rect x="290" y="334" width="500" height="18" rx="9" fill="#d7e3ef" opacity="0.7"/>
    <rect x="290" y="370" width="320" height="18" rx="9" fill="#d7e3ef" opacity="0.7"/>
  </g>
  <text x="90" y="120" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">NEWS</text>
  <text x="90" y="185" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700">Event</text>
  <text x="90" y="230" fill="#d7e3ef" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600">Temporary placeholder image</text>
  <text x="90" y="280" fill="#9fb3c8" font-family="Arial, Helvetica, sans-serif" font-size="20">Replace with approved event photography.</text>
  <rect x="90" y="690" width="180" height="6" rx="3" fill="#38bdf8"/>
</svg>
  </g>
  <text x="90" y="120" fill="#34d399" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">NEWS</text>
  <text x="90" y="185" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700">Research Update</text>
  <text x="90" y="230" fill="#d7e3ef" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600">Temporary placeholder image</text>
  <text x="90" y="280" fill="#9fb3c8" font-family="Arial, Helvetica, sans-serif" font-size="20">Replace with approved research documentation photography.</text>
  <rect x="90" y="690" width="180" height="6" rx="3" fill="#34d399"/>

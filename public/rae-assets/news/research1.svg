<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title>RAE research news placeholder</title>
  <desc>Temporary institutional fallback for research news imagery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081826"/>
      <stop offset="100%" stop-color="#10433b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g fill="none" stroke="#34d399" stroke-width="8" opacity="0.9">
    <path d="M250 500C350 360 450 300 600 300s250 60 350 200"/>
    <path d="M290 500c120-70 210-95 310-95s190 25 310 95"/>
